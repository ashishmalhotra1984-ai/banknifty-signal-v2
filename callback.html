<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kite Token — BN Signal V3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f2f4f7;
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #fff;
  border: 1px solid #dde1e9;
  border-radius: 10px;
  padding: 32px 36px;
  max-width: 440px;
  width: 90%;
  text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
}
.title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: #00a36b;
  margin-bottom: 6px;
}
.sub {
  font-size: 10px;
  color: #7a8296;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 24px;
}
.status { font-size: 13px; color: #7a8296; margin-bottom: 16px; }
.token-box {
  background: #f7f8fa;
  border: 1px solid #c8cdd8;
  border-radius: 6px;
  padding: 12px 14px;
  font-size: 12px;
  color: #1a6fd4;
  word-break: break-all;
  letter-spacing: 0.03em;
  margin: 16px 0;
  display: none;
}
.btn {
  display: inline-block;
  margin-top: 8px;
  padding: 10px 24px;
  background: #00a36b;
  color: #000;
  border: none;
  border-radius: 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: #33ffb8; }
.btn-copy {
  background: transparent;
  border: 1px solid #1a6fd4;
  color: #1a6fd4;
  margin-right: 8px;
}
.btn-copy:hover { background: #1a6fd4; color: #fff; }
.err { color: #e0002e; font-size: 12px; margin-top: 12px; }
.ok  { color: #00a36b; font-size: 12px; margin-top: 8px; }
.spinner {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid #dde1e9;
  border-top-color: #00a36b;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="title">KITE TOKEN</div>
  <div class="sub">BN Signal V3 · Access Token Generator</div>
  <div id="spinner" class="spinner"></div>
  <div class="status" id="statusMsg">Exchanging token...</div>
  <div class="token-box" id="tokenBox"></div>
  <div id="actions" style="display:none">
    <button class="btn btn-copy" onclick="copyToken()">Copy Token</button>
    <a href="/" class="btn" style="text-decoration:none">→ Open Signal App</a>
  </div>
  <div id="errMsg" class="err"></div>
  <div id="okMsg" class="ok"></div>
</div>

<script>
let accessToken = null;

async function init() {
  const params = new URLSearchParams(window.location.search);
  const requestToken = params.get('request_token');

  if (!requestToken) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('statusMsg').textContent = 'Something went wrong';
    document.getElementById('errMsg').textContent = 'No request token. Please login again.';
    return;
  }

  document.getElementById('statusMsg').textContent = 'Exchanging token with Kite...';

  try {
    const res = await fetch(`/api/token?request_token=${requestToken}`);
    const data = await res.json();

    document.getElementById('spinner').style.display = 'none';

    if (data.status === 'success') {
      accessToken = data.access_token;
      document.getElementById('statusMsg').textContent = '✓ Access token ready';
      document.getElementById('statusMsg').style.color = '#00a36b';
      document.getElementById('tokenBox').textContent = accessToken;
      document.getElementById('tokenBox').style.display = 'block';
      document.getElementById('actions').style.display = 'block';

      // Auto-copy to clipboard
      try {
        await navigator.clipboard.writeText(accessToken);
        document.getElementById('okMsg').textContent = '✓ Token copied to clipboard automatically';
      } catch(e) {
        document.getElementById('okMsg').textContent = 'Tap "Copy Token" to copy';
      }
    } else {
      document.getElementById('statusMsg').textContent = 'Exchange failed';
      document.getElementById('errMsg').textContent = data.message || 'Unknown error. Try logging in again.';
    }
  } catch(e) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('statusMsg').textContent = 'Network error';
    document.getElementById('errMsg').textContent = e.message;
  }
}

function copyToken() {
  if (!accessToken) return;
  navigator.clipboard?.writeText(accessToken).then(() => {
    document.getElementById('okMsg').textContent = '✓ Copied!';
  });
}

init();
</script>
</body>
</html>
