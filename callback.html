<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kite Token Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f2f4f7; font-family: 'IBM Plex Mono', monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #fff; border-radius: 12px; padding: 32px; max-width: 480px; width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,0.08); text-align: center; }
.logo { font-size: 22px; font-weight: 700; color: #00a36b; letter-spacing: 0.1em; margin-bottom: 8px; }
.sub { font-size: 11px; color: #7a8296; margin-bottom: 24px; }
.status { font-size: 13px; color: #1a1d26; margin-bottom: 16px; }
.token-box { background: #f0fdf7; border: 1px solid #00a36b; border-radius: 8px; padding: 16px; font-size: 13px; color: #00a36b; word-break: break-all; margin: 16px 0; display: none; }
.copy-btn { background: #00a36b; color: #fff; border: none; border-radius: 6px; padding: 12px 24px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 700; cursor: pointer; display: none; width: 100%; margin-bottom: 12px; }
.instructions { font-size: 11px; color: #7a8296; line-height: 1.8; background: #f7f8fa; border-radius: 6px; padding: 12px; display: none; text-align: left; }
.err { color: #e0002e; font-size: 12px; margin-top: 12px; }
.spinner { width: 32px; height: 32px; border: 3px solid #dde1e9; border-top-color: #00a36b; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">KITE TOKEN</div>
  <div class="sub">BN Signal V3 · Access Token Generator</div>
  <div class="status" id="status">Processing login...</div>
  <div class="spinner" id="spinner"></div>
  <div class="token-box" id="tokenBox"></div>
  <button class="copy-btn" id="copyBtn" onclick="copyToken()">Copy Token</button>
  <div class="instructions" id="instructions">✓ Token copied!<br><br>Go back to BN Signal V3 app → paste into Access Token box → tap Connect<br><br>This token expires at 6 AM tomorrow.</div>
  <div class="err" id="errMsg"></div>
</div>
<script>
const API_KEY='emlejwo63jey9jve',API_SECRET='c9zkqwgdclmqpwy1whlefvq3mr4c6g97';
async function init(){
  const p=new URLSearchParams(window.location.search);
  const rt=p.get('request_token'),st=p.get('status');
  if(!rt||st!=='success'){showError('No request token. Please login again.');return;}
  document.getElementById('status').textContent='Generating access token...';
  try{
    const raw=API_KEY+rt+API_SECRET;
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(raw));
    const cs=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    const res=await fetch('https://api.kite.trade/session/token',{method:'POST',headers:{'X-Kite-Version':'3','Content-Type':'application/x-www-form-urlencoded'},body:`api_key=${API_KEY}&request_token=${rt}&checksum=${cs}`});
    const json=await res.json();
    if(json.status==='success'&&json.data?.access_token){showToken(json.data.access_token);}
    else{showError('Kite error: '+(json.message||'Unknown'));}
  }catch(e){showError('Error: '+e.message);}
}
function showToken(token){
  document.getElementById('spinner').style.display='none';
  document.getElementById('status').textContent='✓ Access token ready!';
  document.getElementById('status').style.color='#00a36b';
  const b=document.getElementById('tokenBox');b.textContent=token;b.style.display='block';
  document.getElementById('copyBtn').style.display='block';
  navigator.clipboard?.writeText(token).then(()=>{document.getElementById('instructions').style.display='block';});
}
function copyToken(){
  const t=document.getElementById('tokenBox').textContent;
  navigator.clipboard?.writeText(t).then(()=>{document.getElementById('copyBtn').textContent='✓ Copied!';document.getElementById('instructions').style.display='block';setTimeout(()=>{document.getElementById('copyBtn').textContent='Copy Token';},2000);});
}
function showError(m){document.getElementById('spinner').style.display='none';document.getElementById('status').textContent='Something went wrong';document.getElementById('errMsg').textContent=m;}
init();
</script>
</body>
</html>
